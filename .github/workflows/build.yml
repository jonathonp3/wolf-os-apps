name: Build and Release Custom Editor
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  flatpak:
    name: "Build and Release"
    runs-on: ubuntu-latest
    
    # We remove the container block from the top level 
    # and run it specifically for the build steps
    steps:
    - uses: actions/checkout@v4

    # 1. Install rsync on the Ubuntu Host (This will now work!)
    - name: Install rsync on host
      run: sudo apt-get update && sudo apt-get install -y rsync

    # 2. Build the app INSIDE the container
    - name: Run Build in Fedora Container
      uses: addnab/docker-run-action@v3
      with:
        image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-46
        options: -v ${{ github.workspace }}:/workspace --privileged
        run: |
          cd /workspace
          # Prepare
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.gnome.Sdk//46 org.gnome.Platform//46
          
          # Inject & Build
          python3 update_manifest.py
          flatpak-builder --user --disable-rofiles-fuse --repo=wolf-os-apps --force-clean build-dir-stable org.gnome.TextEditor.json
          flatpak build-update-repo wolf-os-apps
          flatpak build-bundle wolf-os-apps gnome-text-editor-stable.flatpak org.gnome.TextEditor stable

    # 3. Create the Release on the host
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest-build
        name: "Wolf-OS App Store - Latest"
        files: gnome-text-editor-stable.flatpak    
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # 4. Deploy the Repo to GitHub Pages on the host
    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: wolf-os-apps
        branch: gh-pages

