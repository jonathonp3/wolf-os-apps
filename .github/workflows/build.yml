name: Build and Release Custom Editor
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  flatpak:
    name: "Build and Release"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    # 1. Install rsync on the Ubuntu Host
    - name: Install rsync
      run: sudo apt update && sudo apt install -y rsync    

    # 2. PERFORM THE ENTIRE BUILD INSIDE THE CONTAINER
    - name: Flatpak Build Environment
      uses: addnab/docker-run-action@v3
      with:
        image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-47
        options: -v ${{ github.workspace }}:/workspace --privileged   
        run: |
          cd /workspace
          
          # Setup Runtimes
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.gnome.Sdk//50 org.gnome.Platform//50
          
          # Prepare the Manifest
          python3 update_manifest.py
          
          # THE FIX: We use 'deploy-repo' as the folder name to avoid clashing with repo name
          flatpak-builder --user --disable-rofiles-fuse --repo=deploy-repo --force-clean build-dir-stable org.gnome.TextEditor.json
          flatpak build-update-repo deploy-repo
          flatpak build-bundle deploy-repo gnome-text-editor-stable.flatpak org.gnome.TextEditor stable

          # Unlock permissions for the Host Runner
          chmod -R 777 /workspace/deploy-repo
          chmod 666 /workspace/gnome-text-editor-stable.flatpak

    # 3. Create a GitHub Release
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest-build
        name: "Wolf-OS App Store - Latest"
        files: gnome-text-editor-stable.flatpak
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # 4. Deploy the Repo to GitHub Pages
    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: deploy-repo # Points to the new unique folder name
        branch: gh-pages

