name: Build and Release Custom Editor
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  flatpak:
    name: "Build and Release"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    # 1. Install rsync on the Ubuntu Host (Needed for Pages deployment)
    - name: Install rsync
      run: sudo apt update && sudo apt install -y rsync    

    # 2. PERFORM THE ENTIRE BUILD INSIDE THE CONTAINER
    - name: Flatpak Build Environment
      uses: addnab/docker-run-action@v3
      with:
        image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-47
        options: -v ${{ github.workspace }}:/workspace --privileged   
        run: |
          cd /workspace
          
          # 1. Setup Runtimes
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.gnome.Sdk//47 org.gnome.Platform//47
          
          # 2. Inject Themes (Python)
          python3 update_manifest.py
          
          # 3. Build the Repository and Bundle
          flatpak-builder --user --disable-rofiles-fuse --repo=wolf-os-apps --force-clean build-dir-stable org.gnome.TextEditor.json
          flatpak build-update-repo wolf-os-apps
          flatpak build-bundle wolf-os-apps gnome-text-editor-stable.flatpak org.gnome.TextEditor stable

          # THE FIX: Unlock permissions for the Host Runner
          # This ensures the Ubuntu 'rsync' tool can read the files
          chmod -R 777 /workspace/wolf-os-apps
          chmod 666 /workspace/gnome-text-editor-stable.flatpak

    # 3. Create a GitHub Release (Back on the Ubuntu Host)
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest-build
        name: "Wolf-OS App Store - Latest"
        files: gnome-text-editor-stable.flatpak
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # 4. Deploy the Repo to GitHub Pages (Back on the Ubuntu Host)
    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: wolf-os-apps
        branch: gh-pages

